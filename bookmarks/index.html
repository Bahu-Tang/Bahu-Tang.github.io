<div class="bookmarks-page">
  <aside class="bookmarks-sidebar">
    <input type="text" id="bm-search" placeholder="搜索收藏夹..." class="bm-search-input">
    <ul class="bm-tree" id="bm-tree"></ul>
  </aside>
  <section class="bookmarks-content" id="bm-content">
    <p class="bm-placeholder">选择一个分类查看链接</p>
  </section>
</div>

<script>
{% include bookmarks_data.js %}
</script>
<script>
(function(){
  const data = BOOKMARKS_DATA;
  const treeEl = document.getElementById('bm-tree');
  const contentEl = document.getElementById('bm-content');
  const searchEl = document.getElementById('bm-search');
  
  function buildTree(node, depth) {
    const li = document.createElement('li');
    const div = document.createElement('div');
    div.className = 'bm-folder';
    div.style.paddingLeft = (depth * 16) + 'px';
    div.innerHTML = '<span class="bm-toggle">&#9654;</span> ' + node.name;
    div.onclick = function(e){
      e.stopPropagation();
      showContent(node);
      const ul = li.querySelector('ul');
      if(ul) { ul.style.display = ul.style.display === 'none' ? 'block' : 'none'; div.querySelector('.bm-toggle').innerHTML = ul.style.display==='none'?'&#9654;':'&#9660;'; }
    };
    li.appendChild(div);
    if(node.children && node.children.length > 0) {
      const ul = document.createElement('ul');
      node.children.forEach(c => ul.appendChild(buildTree(c, depth+1)));
      li.appendChild(ul);
    }
    return li;
  }
  
  function showContent(node) {
    let html = '<h2>' + node.name + '</h2>';
    if(node.bookmarks && node.bookmarks.length > 0) {
      html += '<ul class="bm-links">';
      node.bookmarks.forEach(b => {
        let title = b.title;
        if(title.length > 80) title = title.substring(0,80) + '...';
        html += '<li><a href="' + b.url + '" target="_blank" rel="noopener">' + title + '</a></li>';
      });
      html += '</ul>';
    }
    if(node.children && node.children.length > 0) {
      html += '<div class="bm-subfolders">';
      node.children.forEach(c => {
        let count = (c.bookmarks ? c.bookmarks.length : 0);
        html += '<span class="bm-subfolder" onclick="document.querySelectorAll(\'.bm-folder\').forEach(function(el){if(el.textContent.includes(\'' + c.name + '\'))el.click();})">' + c.name + ' (' + count + ')</span>';
      });
      html += '</div>';
    }
    contentEl.innerHTML = html;
  }
  
  // Build tree
  data.children.forEach(c => treeEl.appendChild(buildTree(c, 0)));
  
  // Search
  searchEl.addEventListener('input', function(){
    const q = this.value.toLowerCase();
    const allFolders = treeEl.querySelectorAll('.bm-folder');
    allFolders.forEach(f => {
      const li = f.parentElement;
      if(!q) { li.style.display = ''; return; }
      const hasMatch = f.textContent.toLowerCase().includes(q) ||
        (li.querySelector('ul') && li.querySelector('ul').textContent.toLowerCase().includes(q));
      li.style.display = hasMatch ? '' : 'none';
    });
    if(q) {
      // Show all matching bookmarks
      let results = [];
      function searchNode(node) {
        if(node.bookmarks) {
          node.bookmarks.forEach(b => {
            if(b.title.toLowerCase().includes(q)) results.push(b);
          });
        }
        if(node.children) node.children.forEach(searchNode);
      }
      searchNode(data);
      let html = '<h2>搜索结果: "' + q + '" (' + results.length + ')</h2><ul class="bm-links">';
      results.forEach(b => {
        let title = b.title;
        if(title.length > 100) title = title.substring(0,100) + '...';
        html += '<li><a href="' + b.url + '" target="_blank" rel="noopener">' + title + '</a></li>';
      });
      html += '</ul>';
      contentEl.innerHTML = html;
    }
  });
})();
</script>
