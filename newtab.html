<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>128 · New Tab</title>
<style>
  :root {
    --green: #4CAF50;
    --green-dark: #388E3C;
    --green-pale: rgba(76,175,80,0.12);
    --green-light: rgba(76,175,80,0.25);
    --text: #2C3E50;
    --text-light: #6B7280;
    --card: rgba(255,255,255,0.88);
    --radius: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.04);
    --shadow-hover: 0 8px 28px rgba(76,175,80,0.18);
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    --blur: blur(6px);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    color: var(--text);
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh;
    padding: 2rem 1.5rem;
    -webkit-font-smoothing: antialiased;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    position: relative;
    transition: background-image 0.8s ease, background-color 0.8s ease;
  }
  body::before {
    content: "";
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.55);
    z-index: 0;
  }
  .container { max-width: 980px; width: 100%; position: relative; z-index: 1; }

  /* ===== Top bar ===== */
  .top-bar {
    display: flex; justify-content: flex-end; align-items: center;
    gap: 0.5rem; margin-bottom: 1rem;
  }
  .top-bar button {
    background: var(--card); border: 1px solid rgba(0,0,0,0.08);
    border-radius: 22px; padding: 0.4rem 0.85rem;
    font-size: 0.8rem; color: var(--text-light); cursor: pointer;
    backdrop-filter: var(--blur); transition: all var(--transition);
    font-family: inherit; line-height: 1.4;
  }
  .top-bar button:hover { color: var(--text); border-color: var(--green); }

  /* ===== Hero ===== */
  header { text-align: center; padding: 1.5rem 0 0.5rem; }
  header h1 { font-size: 2rem; font-weight: 800; color: var(--text); letter-spacing: 3px; }
  .clock { font-size: 1.25rem; color: var(--text-light); margin-top: 0.5rem; font-weight: 400; letter-spacing: 1px; }

  /* ===== Search ===== */
  .search-row {
    display: flex; justify-content: center; align-items: stretch;
    margin: 1.5rem 0 2rem; gap: 0; position: relative;
  }
  .search-box {
    display: flex; align-items: stretch;
    background: var(--card); backdrop-filter: var(--blur);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 28px; max-width: 560px; width: 100%;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .search-box:focus-within { border-color: var(--green); box-shadow: 0 0 0 3px rgba(76,175,80,0.15); }
  .search-engine {
    padding: 0 0.3rem 0 0.9rem; cursor: pointer;
    font-size: 0.8rem; color: var(--text-light);
    display: flex; align-items: center; gap: 0.35rem;
    white-space: nowrap; transition: color var(--transition);
    flex-shrink: 0; user-select: none;
  }
  .search-engine:hover { color: var(--green); }
  .search-engine .eng-icon { font-size: 1rem; line-height: 1; }
  .search-box input {
    flex: 1; max-width: 500px; height: 46px;
    padding: 0 1.25rem;
    border: none; outline: none;
    font-size: 0.95rem; line-height: 1.4;
    background: transparent;
    color: var(--text);
  }

  .engines-popup {
    display: none; position: absolute;
    left: 0; top: 100%; margin-top: 4px;
    background: var(--card); border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    padding: 0.3rem 0; z-index: 10; min-width: 140px;
    backdrop-filter: blur(16px); border: 1px solid rgba(0,0,0,0.06);
  }
  .engines-popup.show { display: block; }
  .engines-popup div {
    padding: 0.45rem 0.85rem; cursor: pointer;
    font-size: 0.82rem; transition: background var(--transition);
  }
  .engines-popup div:hover { background: var(--green-pale); }
  .engines-popup div.active { color: var(--green); font-weight: 600; }

  /* ===== Cards ===== */
  .category { margin-bottom: 2.2rem; }
  .category h2 {
    font-size: 0.95rem; font-weight: 600; color: var(--text-light);
    margin-bottom: 0.85rem; padding-left: 0.6rem;
    border-left: 3px solid var(--green);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 0.6rem;
  }
  .card {
    background: var(--card); backdrop-filter: var(--blur);
    border-radius: var(--radius); padding: 1rem 0.6rem;
    text-align: center; box-shadow: var(--shadow);
    transition: all var(--transition);
    text-decoration: none; color: var(--text);
    display: flex; flex-direction: column; align-items: center; gap: 0.55rem;
    cursor: pointer; position: relative; overflow: hidden;
  }
  .card::after {
    content: ""; position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px; background: var(--green);
    transform: scaleX(0); transition: transform var(--transition);
  }
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
  .card:hover::after { transform: scaleX(1); }
  .card img {
    width: 34px; height: 34px; border-radius: 8px;
    background: transparent; object-fit: contain;
    transition: transform var(--transition);
  }
  .card:hover img { transform: scale(1.1); }
  .card .icon-letter {
    width: 34px; height: 34px; border-radius: 8px;
    background: var(--green-pale); color: var(--green-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; font-weight: 700;
  }
  .card span {
    font-size: 0.82rem; font-weight: 500; line-height: 1.3; word-break: break-word;
  }

  /* ===== Background picker ===== */
  .bg-options {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.35); z-index: 100;
    justify-content: center; align-items: center;
  }
  .bg-options.show { display: flex; }
  .bg-panel {
    background: #fff; border-radius: 16px; padding: 1.5rem;
    max-width: 500px; width: 90%;
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    max-height: 90vh; overflow-y: auto;
  }
  .bg-panel h3 { font-size: 1.1rem; margin-bottom: 1rem; }
  .bg-presets {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 0.5rem; margin-bottom: 1rem;
  }
  .bg-preset {
    height: 60px; border-radius: 10px; cursor: pointer;
    background-size: cover; background-position: center;
    border: 2px solid transparent; transition: all var(--transition);
  }
  .bg-preset:hover { transform: scale(1.05); }
  .bg-preset.active { border-color: var(--green); box-shadow: 0 0 0 3px rgba(76,175,80,0.25); }

  .bg-section-label { font-size: 0.8rem; color: var(--text-light); margin: 0.75rem 0 0.5rem; font-weight: 600; }
  .bg-url-row { display: flex; gap: 0.5rem; }
  .bg-url-row input[type="text"] { flex: 1; padding: 0.5rem 0.75rem; border: 1px solid #ddd;
    border-radius: 8px; font-size: 0.85rem; outline: none; }
  .bg-upload-btn {
    padding: 0.5rem 0.9rem; background: var(--green-pale); color: var(--green-dark);
    border: 1px solid var(--green-light); border-radius: 8px;
    cursor: pointer; font-size: 0.8rem; white-space: nowrap;
    font-family: inherit; display: flex; align-items: center; gap: 0.3rem;
  }
  .bg-upload-btn:hover { background: var(--green-light); }
  .bg-upload-btn input { display: none; }
  .bg-panel .btn-row { display: flex; gap: 0.5rem; margin-top: 0.75rem; justify-content: flex-end; }
  .bg-panel .btn {
    padding: 0.45rem 1rem; border-radius: 8px; border: none; cursor: pointer;
    font-size: 0.85rem; font-family: inherit;
  }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-secondary { background: #eee; color: var(--text); }
  .btn-danger { background: none; border: none; color: #e74c3c; cursor: pointer;
    font-size: 0.8rem; padding: 0.3rem 0.6rem; border-radius: 6px; }
  .btn-danger:hover { background: #fdeaea; }

  /* ===== Footer ===== */
  footer { text-align: center; padding: 1.5rem 0; color: var(--text-light); font-size: 0.78rem; }
  footer a { color: var(--green); }

  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
    header h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <button onclick="toggleBgPicker()">🖼 背景</button>
  </div>

  <header>
    <h1>128</h1>
    <div class="clock" id="clock"></div>
  </header>

  <div class="search-row">
    <div class="search-box" style="position:relative">
      <div class="search-engine" onclick="toggleEngines()">
        <span class="eng-icon" id="eng-icon">🔍</span>
        <span id="eng-label">Google</span>
        <span style="font-size:0.55rem;margin-left:0.15rem">▼</span>
      </div>
      <div class="engines-popup" id="engines-popup"></div>
      <input type="text" id="search" placeholder="搜索或输入网址..." autofocus>
    </div>
  </div>

  <div id="content"></div>

  <footer>
    <a href="https://Bahu-Tang.github.io">主页</a> ·
    <a href="https://Bahu-Tang.github.io/bookmarks/">收藏夹</a>
  </footer>
</div>

<!-- Background picker -->
<div class="bg-options" id="bg-picker" onclick="this===event.target&&toggleBgPicker()">
  <div class="bg-panel">
    <h3>更换背景</h3>
    <div class="bg-presets" id="bg-presets"></div>

    <div class="bg-section-label">📎 本地上传</div>
    <div class="bg-url-row">
      <label class="bg-upload-btn">
        📁 选择图片<input type="file" id="bg-file" accept="image/*" onchange="handleFileUpload(this)">
      </label>
      <button class="btn btn-danger" onclick="resetBg()" title="恢复默认背景">清除背景</button>
    </div>

    <div class="bg-section-label">🔗 图片链接</div>
    <div class="bg-url-row">
      <input type="text" id="bg-url" placeholder="输入图片URL...">
      <button class="btn btn-primary" onclick="applyCustomBg()">应用</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="toggleBgPicker()">完成</button>
    </div>
  </div>
</div>

<script>
// ===== Data =====
const DATA = [
  {"category":"社交 / 媒体","items":[
    {"title":"Bilibili","url":"https://www.bilibili.com/"},
    {"title":"GitHub","url":"https://github.com/"},
    {"title":"知乎","url":"https://www.zhihu.com/"},
    {"title":"QQ邮箱","url":"https://mail.qq.com/"},
    {"title":"网易邮箱","url":"https://mail.163.com/"},
    {"title":"公众号","url":"https://mp.weixin.qq.com/"},
    {"title":"豆瓣","url":"https://www.douban.com/"},
    {"title":"抖音","url":"https://www.douyin.com/"},
    {"title":"Notion","url":"https://www.notion.so/"},
    {"title":"YouTube","url":"https://www.youtube.com/"},
    {"title":"CSDN","url":"https://www.csdn.net/"}
  ]},
  {"category":"AI 大模型","items":[
    {"title":"ChatGPT","url":"https://chatgpt.com/"},
    {"title":"Claude","url":"https://claude.ai/"},
    {"title":"DeepSeek","url":"https://chat.deepseek.com/"},
    {"title":"豆包","url":"https://www.doubao.com/"},
    {"title":"OpenCode","url":"https://opencode.ai/"},
    {"title":"DeepSeek API","url":"https://platform.deepseek.com/"},
    {"title":"Vercel","url":"https://vercel.com/"},
    {"title":"OpenCode控制台","url":"https://opencode.ai/workspace/wrk_01KS3XJFJ9GDHFRARBYZX9GY1M"}
  ]}
];

// ===== Multi-source favicon loading =====
function getFaviconSources(url) {
  var domain = new URL(url).hostname;
  return [
    'https://icons.duckduckgo.com/ip3/' + domain + '.ico',
    'https://favicon.splitbee.io/?url=' + encodeURIComponent(url),
    'https://www.google.com/s2/favicons?domain=' + domain + '&sz=64',
    'https://api.faviconkit.com/' + domain + '/64'
  ];
}

// ===== Search engines =====
const ENGINES = [
  { name: 'Google', icon: '🔍', search: 'https://www.google.com/search?q=' },
  { name: 'Baidu', icon: '🔎', search: 'https://www.baidu.com/s?wd=' },
  { name: 'Bing', icon: '🔎', search: 'https://www.bing.com/search?q=' },
  { name: 'DuckDuckGo', icon: '🦆', search: 'https://duckduckgo.com/?q=' }
];

function getEngine() { return parseInt(localStorage.getItem('nt-engine')||'0'); }
function setEngine(i) { localStorage.setItem('nt-engine',i); updateEngineUI(); }
function updateEngineUI() {
  var e = ENGINES[getEngine()];
  document.getElementById('eng-icon').textContent = e.icon;
  document.getElementById('eng-label').textContent = e.name;
  var popup = document.getElementById('engines-popup');
  popup.innerHTML = ENGINES.map(function(eng,i){
    return '<div class="'+(i===getEngine()?'active':'')+'" onclick="setEngine('+i+');toggleEngines()">'+eng.icon+' '+eng.name+'</div>';
  }).join('');
}
function toggleEngines() {
  document.getElementById('engines-popup').classList.toggle('show');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-engine') && !e.target.closest('.engines-popup')) {
    document.getElementById('engines-popup').classList.remove('show');
  }
});
updateEngineUI();

// ===== Background system =====
const BG_PRESETS = [
  { name: '默认白', css: '#F5F7FA' },
  { name: '渐变绿', css: 'linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%)' },
  { name: '渐变蓝', css: 'linear-gradient(135deg, #e3f2fd 0%, #bbdefb 50%, #90caf9 100%)' },
  { name: '渐变暖', css: 'linear-gradient(135deg, #fff3e0 0%, #ffe0b2 50%, #ffcc80 100%)' },
  { name: '暗夜', css: 'linear-gradient(135deg, #263238 0%, #37474f 50%, #455a64 100%)' },
  { name: '樱花', css: 'linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%)' },
  { name: '海洋', css: 'linear-gradient(135deg, #e0f7fa 0%, #80deea 50%, #4dd0e1 100%)' },
  { name: '旭日', css: 'linear-gradient(135deg, #fff8e1 0%, #ffe082 50%, #ffb74d 100%)' },
];

function getBg() { return localStorage.getItem('nt-bg') || ''; }
function setBg(val) {
  localStorage.setItem('nt-bg', val);
  if (val.startsWith('url(') || val.startsWith('data:') || val.startsWith('http')) {
    document.body.style.backgroundImage = val.startsWith('url(') ? val : 'url('+val+')';
    document.body.style.backgroundColor = '#F5F7FA';
    document.body.style.backgroundSize = 'cover';
  } else if (val.includes('gradient')) {
    document.body.style.backgroundImage = val;
    document.body.style.backgroundColor = '';
    document.body.style.backgroundSize = 'auto';
  } else {
    document.body.style.backgroundImage = 'none';
    document.body.style.backgroundColor = val || '#F5F7FA';
    document.body.style.backgroundSize = 'auto';
  }
}

// Reset background to default
function resetBg() {
  localStorage.removeItem('nt-bg');
  document.body.style.backgroundImage = 'none';
  document.body.style.backgroundColor = '#F5F7FA';
  document.body.style.backgroundSize = 'auto';
  if (document.getElementById('bg-picker').classList.contains('show')) {
    renderBgPanel();
  }
}

function applyBg() { var saved = getBg(); if (saved) setBg(saved); }
applyBg();

function toggleBgPicker() {
  var picker = document.getElementById('bg-picker');
  picker.classList.toggle('show');
  if (picker.classList.contains('show')) renderBgPanel();
}

function renderBgPanel() {
  var presets = document.getElementById('bg-presets');
  var current = getBg();
  presets.innerHTML = BG_PRESETS.map(function(b){
    var cssSafe = b.css.replace(/'/g,"\\'");
    return '<div class="bg-preset'+(b.css===current?' active':'')+'" style="background:'+b.css+'" title="'+b.name+'" '+
      'onclick="setBg(\''+cssSafe+'\');renderBgPanel()"></div>';
  }).join('');
  document.getElementById('bg-url').value = '';
}

// Handle local file upload (convert to data URL, store in localStorage)
function handleFileUpload(input) {
  var file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { // 5MB limit
    alert('图片文件不能超过 5MB，请选择更小的图片。');
    input.value = '';
    return;
  }
  var reader = new FileReader();
  reader.onload = function(e) {
    setBg(e.target.result);
    renderBgPanel();
  };
  reader.readAsDataURL(file);
}

function applyCustomBg() {
  var url = document.getElementById('bg-url').value.trim();
  if (url) { setBg(url); toggleBgPicker(); }
}

// ===== Clock =====
function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  var weekdays = ['日','一','二','三','四','五','六'];
  var w = weekdays[now.getDay()];
  document.getElementById('clock').textContent = h+':'+m+' · 星期'+w;
}
updateClock();
setInterval(updateClock, 30000);

// ===== Render cards with multi-source favicon fallback =====
function render(items) {
  var content = document.getElementById('content');
  var html = '';
  for (var ci = 0; ci < items.length; ci++) {
    var cat = items[ci];
    html += '<div class="category"><h2>'+cat.category+'</h2><div class="grid">';
    for (var ii = 0; ii < cat.items.length; ii++) {
      var item = cat.items[ii];
      var sources = getFaviconSources(item.url);
      var dataSources = sources.map(function(s){return ' data-src-'+sources.indexOf(s)+'="'+s+'"';}).join('');
      html += '<a href="'+item.url+'" class="card">'+
        '<img src="'+sources[0]+'" alt="" loading="lazy" '+
        'data-sources="'+sources.join('||')+'" '+
        'onerror="(function(img){var srcs=img.getAttribute(\'data-sources\').split(\'||\');var idx=parseInt(img.getAttribute(\'data-try\')||\'0\');if(idx+1<srcs.length){img.setAttribute(\'data-try\',idx+1);img.src=srcs[idx+1];}else{img.style.display=\'none\';img.nextElementSibling.style.display=\'flex\';}})(this)">'+
        '<div class="icon-letter" style="display:none">'+item.title.charAt(0)+'</div>'+
        '<span>'+item.title+'</span></a>';
    }
    html += '</div></div>';
  }
  content.innerHTML = html;
}
render(DATA);

// ===== Search =====
var search = document.getElementById('search');

search.addEventListener('input', function() {
  var q = this.value.toLowerCase();
  if (!q) { render(DATA); return; }
  var filtered = DATA.map(function(cat){
    return {
      category: cat.category,
      items: cat.items.filter(function(i){ return i.title.toLowerCase().indexOf(q)>=0 || i.url.toLowerCase().indexOf(q)>=0; })
    };
  }).filter(function(c){ return c.items.length > 0; });
  render(filtered);
});

search.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var q = this.value.trim();
    if (!q) return;
    if (q.indexOf('.')>=0 && q.indexOf(' ')=== -1 && q.indexOf('：')=== -1 && q.indexOf('？')=== -1) {
      var url = q;
      if (url.indexOf('http') !== 0) url = 'https://' + url;
      window.location.href = url;
    } else {
      window.location.href = ENGINES[getEngine()].search + encodeURIComponent(q);
    }
  }
});

// Focus search on click-anywhere
document.addEventListener('click', function(e) {
  if (e.target.tagName !== 'A' && e.target.tagName !== 'INPUT' &&
      e.target.tagName !== 'BUTTON' && e.target.tagName !== 'LABEL' &&
      !e.target.closest('.bg-panel') && !e.target.closest('.search-engine')) {
    search.focus();
  }
});

// Keyboard shortcuts: 1-9
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey || e.metaKey || e.altKey || e.target === search) return;
  var num = parseInt(e.key);
  if (num >= 1 && num <= 9) {
    var cards = document.querySelectorAll('.card');
    if (cards[num-1]) cards[num-1].click();
  }
});
</script>
</body>
</html>
