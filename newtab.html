<head>

<title>128 · New Tab</title>
<style>
  :root {
    --green: #4CAF50;
    --green-dark: #388E3C;
    --green-pale: #E8F5E9;
    --green-light: #C8E6C9;
    --text: #2C3E50;
    --text-light: #6B7280;
    --bg: #F5F7FA;
    --card: #FFFFFF;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.05);
    --shadow-hover: 0 8px 24px rgba(76,175,80,0.15);
    --transition: 0.2s ease;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh;
    padding: 2rem 1.5rem;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 960px; width: 100%; }
  header {
    text-align: center; padding: 1.5rem 0 2rem;
  }
  header h1 {
    font-size: 2.2rem; font-weight: 800; color: var(--text); letter-spacing: 2px;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }
  header h1::before { content: "🌿"; font-size: 1.5rem; }
  .search-box {
    display: flex; justify-content: center; margin-bottom: 2rem;
  }
  .search-box input {
    width: 100%; max-width: 500px;
    padding: 0.7rem 1.25rem;
    border: 1.5px solid #ddd;
    border-radius: 28px;
    font-size: 0.95rem; outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
    background: var(--card);
  }
  .search-box input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(76,175,80,0.15); }
  .category {
    margin-bottom: 2.5rem;
  }
  .category h2 {
    font-size: 1.05rem; font-weight: 600; color: var(--text-light);
    margin-bottom: 1rem; padding-left: 0.6rem;
    border-left: 3px solid var(--green);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 0.75rem;
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 1.15rem 0.75rem;
    text-align: center;
    box-shadow: var(--shadow);
    transition: all var(--transition);
    text-decoration: none;
    color: var(--text);
    display: flex; flex-direction: column; align-items: center; gap: 0.55rem;
    cursor: pointer;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-hover);
    border-bottom: 3px solid var(--green);
    padding-bottom: calc(1.15rem - 3px);
  }
  .card img {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--bg);
    object-fit: contain;
    padding: 2px;
  }
  .card .icon-fallback {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--green-pale);
    color: var(--green-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; font-weight: 700;
  }
  .card span {
    font-size: 0.85rem; font-weight: 500;
    line-height: 1.3; word-break: break-word;
  }
  footer {
    text-align: center; padding: 2rem 0;
    color: var(--text-light); font-size: 0.8rem;
  }
  footer a { color: var(--green); }
  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
    header h1 { font-size: 1.6rem; }
  }
</style>
</head>

function render(items) {
  const content = document.getElementById('content');
  let html = '';
  for (const cat of items) {
    html += '<div class="category"><h2>' + cat.category + '</h2><div class="grid">';
    for (const item of cat.items) {
      let iconHtml;
      if (item.icon) {
        iconHtml = '<img src="' + item.icon + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">';
        iconHtml += '<div class="icon-fallback" style="display:none">' + item.title.charAt(0) + '</div>';
      } else {
        iconHtml = '<div class="icon-fallback">' + item.title.charAt(0) + '</div>';
      }
      html += '<a href="' + item.url + '" class="card">' + iconHtml + '<span>' + item.title + '</span></a>';
    }
    html += '</div></div>';
  }
  content.innerHTML = html;
}

render(DATA);

// Search as you type
const search = document.getElementById('search');
search.addEventListener('input', function() {
  const q = this.value.toLowerCase();
  if (!q) { render(DATA); return; }
  const filtered = DATA.map(cat => ({
    category: cat.category,
    items: cat.items.filter(i => i.title.toLowerCase().includes(q) || i.url.toLowerCase().includes(q))
  })).filter(c => c.items.length > 0);
  render(filtered);
});

// Press Enter to search with default search engine or navigate
search.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const q = this.value.trim();
    if (!q) return;
    if (q.includes('.') && !q.includes(' ')) {
      let url = q;
      if (!url.startsWith('http')) url = 'https://' + url;
      window.location.href = url;
    } else {
      window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q);
    }
  }
});

// Click empty area to focus search
document.addEventListener('click', function(e) {
  if (e.target.tagName !== 'A' && e.target.tagName !== 'INPUT') {
    search.focus();
  }
});

// Quick keyboard navigation: 1-9 to open first 9 cards
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey || e.metaKey || e.altKey || e.target === search) return;
  const num = parseInt(e.key);
  if (num >= 1 && num <= 9) {
    const cards = document.querySelectorAll('.card');
    if (cards[num - 1]) cards[num - 1].click();
  }
});
</script>
